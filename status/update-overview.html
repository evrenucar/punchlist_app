<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Punchlist review</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2' y='2' width='20' height='20' rx='5' fill='%23191b1a' transform='rotate(-4 12 12)'/%3E%3Cpath d='M7 13l3.4 3.4L17.5 8' stroke='white' stroke-width='2.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='20' cy='4.5' r='3' fill='%23ef4444'/%3E%3C/svg%3E">
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6f7f2; --surface: #ffffff; --text: #202422; --muted: #65716b;
    --line: #d8ded8; --accent: #246bfe; --done: #2d7d46; --warn: #bd6f23;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #151716; --surface: #202321; --text: #f1f4ef; --muted: #a8b2aa; --line: #3a403c; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 24px 16px 72px;
  }
  main { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 22px; letter-spacing: -0.01em; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 6px; }
  .progress { font-size: 13px; font-weight: 700; color: var(--accent); margin: 0 0 18px; }
  h2 { font-size: 13px; margin: 26px 0 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
  .item {
    background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 14px; margin: 8px 0;
  }
  .item.noted { border-color: var(--accent); }
  .item h3 { font-size: 15px; margin: 0 0 3px; }
  .item p { margin: 0 0 8px; color: var(--muted); font-size: 13.5px; }
  .answers { display: flex; flex-wrap: wrap; gap: 6px; margin: 2px 0 9px; }
  .chip {
    font: inherit; font-size: 12.5px; line-height: 1.3; padding: 5px 11px;
    border: 1px solid var(--line); border-radius: 999px; background: var(--bg);
    color: var(--text); cursor: pointer; text-align: left;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.picked { background: color-mix(in srgb, var(--accent) 16%, transparent); border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .sketch { margin: 2px 0 10px; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--bg); }
  .sketch svg { display: block; width: 100%; height: auto; max-width: 340px; color: var(--muted); }
  .fb {
    width: 100%; font: inherit; font-size: 13px;
    border: 1px solid var(--line); border-radius: 6px; background: var(--bg);
    color: var(--text); padding: 8px 10px; resize: vertical; min-height: 36px;
  }
  .fb::placeholder { color: var(--muted); opacity: 0.7; }
  .sendbar { display: flex; gap: 10px; align-items: center; margin-top: 26px; flex-wrap: wrap;
    position: sticky; bottom: 0; background: var(--bg); padding: 14px 0 4px; }
  button.send {
    font: inherit; font-size: 14px; font-weight: 700; padding: 9px 16px;
    border: 0; border-radius: 8px; background: var(--accent); color: #fff; cursor: pointer;
  }
  button.reset {
    font: inherit; font-size: 12px; padding: 6px 12px;
    border: 1px solid var(--line); border-radius: 8px; background: var(--surface);
    color: var(--muted); cursor: pointer;
  }
  .sendmsg { font-size: 13px; color: var(--muted); }
  .sendmsg.ok { color: var(--done); font-weight: 700; }
  .sendmsg.err { color: var(--warn); font-weight: 700; }
</style>
</head>
<body>
<main>
  <h1 id="title"></h1>
  <p class="sub" id="intro"></p>
  <p class="progress" id="progress"></p>
  <div id="content"></div>
  <div class="sendbar">
    <button class="send" id="send">Send</button>
    <button class="reset" id="reset">Clear</button>
    <span class="sendmsg" id="sendmsg"></span>
  </div>
</main>
<script>
  const SPEC = {"title":"Update check: review the flow","intro":"Pick one option per state, add a note, and send it all to chat.","sendLabel":"Send my update-flow notes","chatPrefix":"Update flow review:","storageKey":"punchlist-update-overview-v1","sections":[{"heading":"The idea","items":[{"id":"whole-idea","title":"The whole idea","body":"Only the downloaded copy of Punchlist checks GitHub in the background and shows a small banner when a newer build exists. Local data is never touched. The hosted copy on the website never checks.","answers":{"multi":false,"options":["Yes, build it this way","Mostly right, see my notes","No, let's rethink the approach"]},"placeholder":"Anything about the overall flow to change before the states below."}]},{"heading":"1. When it checks","items":[{"id":"check-frequency","title":"How often it checks","body":"The check runs in the background and never blocks the app. Open question: how often it may call GitHub.","answers":{"multi":false,"options":["At most once per day","Every app load, no throttle","At most once per week","Only when I open Settings"]},"placeholder":"Notes on timing, throttle, or when to skip a check."}]},{"heading":"2. Up to date","items":[{"id":"up-to-date","title":"When you are already current","body":"Most loads find nothing new. Question: stay fully silent, or show a small version stamp.","answers":{"multi":false,"options":["Silent, plus a tiny 'vX.Y.Z, current' line in Settings","Fully silent, no stamp anywhere","Stamp in Settings and in the footer"]},"placeholder":"Notes on where, if anywhere, the current version shows."}]},{"heading":"3. Update available","items":[{"id":"banner-copy","title":"Banner wording","body":"A newer build exists. Pick the line that reads best.","answers":{"multi":false,"options":["A newer version of Punchlist is available (vX.Y.Z).","Update available. Punchlist vX.Y.Z is out.","New build vX.Y.Z. You are on vA.B.C.","vX.Y.Z is available."]},"placeholder":"Reword the line however you like."},{"id":"banner-buttons","title":"Banner buttons","body":"The banner needs a button set. Get opens the newest build. What changed opens the release notes.","answers":{"multi":false,"options":["[Get vX.Y.Z] [What changed] [Dismiss]","[Get vX.Y.Z] [Dismiss]","[Get vX.Y.Z] [What changed], X in the corner dismisses","[Get vX.Y.Z] only, no dismiss"]},"placeholder":"Notes on buttons, labels, or which to drop."},{"id":"banner-placement","title":"Banner placement","body":"Where the banner sits when it appears. It should stay easy to ignore.","answers":{"multi":false,"options":["Thin bar pinned to the top","Thin bar pinned to the bottom","A line inside Settings only, no bar","Toast in a corner that auto-fades"]},"placeholder":"Notes on placement and prominence."}]},{"heading":"4. After you dismiss","items":[{"id":"dismissed","title":"What a dismissal remembers","body":"Dismissing hides the banner. Question: when, if ever, it returns.","answers":{"multi":false,"options":["Gone until a build newer than the dismissed one appears","Back on the next app load","Back after 7 days if still not updated","Gone for good until you open Settings"]},"placeholder":"Notes on how sticky the dismissal should be."}]},{"heading":"5. Offline or error","items":[{"id":"offline-error","title":"When the check cannot complete","body":"GitHub may be unreachable, error, or rate limit the check. Question: what the app does then.","answers":{"multi":false,"options":["Fail silent, show nothing, retry at the next allowed check","Fail silent, log a tiny note in Settings","Show a small 'could not check for updates' line"]},"placeholder":"Notes on the failure case."}]},{"heading":"6. Privacy and trust","items":[{"id":"privacy-trust","title":"What leaves the machine","body":"The only network call is one GET to api.github.com for the latest release. No personal data is sent.","answers":{"multi":true,"options":["State this plainly in Settings","Also mention it on the notes page","Add a toggle to turn the check off"]},"placeholder":"Notes on wording or where to surface it."}]}]};
  const KEY = SPEC.storageKey;
  const store = JSON.parse(localStorage.getItem(KEY) || "{}");
  store.notes = store.notes || {};
  store.picks = store.picks || {};

  document.title = "Punchlist — " + SPEC.title;
  document.getElementById("title").textContent = SPEC.title;
  document.getElementById("intro").textContent = SPEC.intro;
  document.getElementById("send").textContent = SPEC.sendLabel;

  const root = document.getElementById("content");
  const allIds = [];

  function persist() { localStorage.setItem(KEY, JSON.stringify(store)); }
  function hasInput(id) {
    return (store.picks[id] && store.picks[id].length) || (store.notes[id] && store.notes[id].trim());
  }
  function paintCard(card, id) { card.classList.toggle("noted", Boolean(hasInput(id))); }
  function paintProgress() {
    const n = allIds.filter(hasInput).length;
    document.getElementById("progress").textContent =
      n ? n + " of " + allIds.length + " answered" : "Click the answers that fit and add notes, then send";
  }

  for (const section of SPEC.sections) {
    const h2 = document.createElement("h2");
    h2.textContent = section.heading;
    root.appendChild(h2);
    for (const item of section.items) {
      allIds.push(item.id);
      const card = document.createElement("div");
      card.className = "item";
      card.dataset.id = item.id;

      const h3 = document.createElement("h3");
      h3.textContent = item.title;
      card.appendChild(h3);

      if (item.body) {
        const p = document.createElement("p");
        p.textContent = item.body;
        card.appendChild(p);
      }
      if (item.sketch) {
        const s = document.createElement("div");
        s.className = "sketch";
        s.innerHTML = item.sketch;
        card.appendChild(s);
      }
      if (item.answers && Array.isArray(item.answers.options)) {
        const multi = Boolean(item.answers.multi);
        const wrap = document.createElement("div");
        wrap.className = "answers";
        for (const opt of item.answers.options) {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "chip";
          b.textContent = opt;
          if ((store.picks[item.id] || []).includes(opt)) b.classList.add("picked");
          b.addEventListener("click", () => {
            let cur = store.picks[item.id] || [];
            if (multi) cur = cur.includes(opt) ? cur.filter((x) => x !== opt) : [...cur, opt];
            else cur = cur.includes(opt) ? [] : [opt];
            store.picks[item.id] = cur;
            if (!cur.length) delete store.picks[item.id];
            persist();
            const picked = store.picks[item.id] || [];
            [...wrap.children].forEach((c) => c.classList.toggle("picked", picked.includes(c.textContent)));
            paintCard(card, item.id);
            paintProgress();
          });
          wrap.appendChild(b);
        }
        card.appendChild(wrap);
      }

      const ta = document.createElement("textarea");
      ta.className = "fb";
      ta.dataset.fb = item.id;
      ta.placeholder = item.placeholder || "Add a note (optional)";
      ta.value = store.notes[item.id] || "";
      ta.addEventListener("input", () => {
        if (ta.value.trim()) store.notes[item.id] = ta.value;
        else delete store.notes[item.id];
        persist();
        paintCard(card, item.id);
        paintProgress();
      });
      card.appendChild(ta);

      paintCard(card, item.id);
      root.appendChild(card);
    }
  }
  paintProgress();

  document.getElementById("reset").addEventListener("click", () => {
    store.notes = {};
    store.picks = {};
    persist();
    location.reload();
  });

  document.getElementById("send").addEventListener("click", async () => {
    const lines = [];
    for (const section of SPEC.sections) {
      for (const item of section.items) {
        if (!hasInput(item.id)) continue;
        const picks = store.picks[item.id] || [];
        const note = (store.notes[item.id] || "").trim();
        let line = "- " + item.title;
        if (picks.length) line += ": " + picks.join(" | ");
        if (note) line += picks.length ? " (note: " + note + ")" : ": " + note;
        lines.push(line);
      }
    }
    const sendmsg = document.getElementById("sendmsg");
    if (!lines.length) {
      sendmsg.textContent = "Nothing to send yet, click an answer or type a note first.";
      sendmsg.className = "sendmsg err";
      return;
    }
    const text = SPEC.chatPrefix + "\n" + lines.join("\n");
    try {
      const r = await fetch("/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ from: "user", text }),
      });
      if (!r.ok) throw new Error();
      sendmsg.textContent = "Sent, the agent has it.";
      sendmsg.className = "sendmsg ok";
    } catch {
      sendmsg.textContent = "Could not reach the agent. Open this at http://localhost:4173" + location.pathname + " and retry.";
      sendmsg.className = "sendmsg err";
    }
  });
</script>
</body>
</html>
