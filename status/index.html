<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Punchlist — Status Board</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2' y='2' width='20' height='20' rx='5' fill='%237c3aed' transform='rotate(-4 12 12)'/%3E%3Cpath d='M7 13l3.4 3.4L17.5 8' stroke='white' stroke-width='2.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  :root {
    color-scheme: light;
    --bg: #f6f7f2;
    --surface: #ffffff;
    --surface-2: #eef4f1;
    --text: #202422;
    --muted: #65716b;
    --line: #d8ded8;
    --line-strong: #b8c2bb;
    --accent: #246bfe;
    --accent-soft: #e9f0ff;
    --done: #2d7d46;
    --font: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --bg: #151716;
      --surface: #202321;
      --surface-2: #292d2a;
      --text: #f1f4ef;
      --muted: #a8b2aa;
      --line: #3a403c;
      --line-strong: #59625c;
      --accent-soft: #1f315f;
    }
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #f6f7f2;
    --surface: #ffffff;
    --surface-2: #eef4f1;
    --text: #202422;
    --muted: #65716b;
    --line: #d8ded8;
    --line-strong: #b8c2bb;
    --accent-soft: #e9f0ff;
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #151716;
    --surface: #202321;
    --surface-2: #292d2a;
    --text: #f1f4ef;
    --muted: #a8b2aa;
    --line: #3a403c;
    --line-strong: #59625c;
    --accent-soft: #1f315f;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.45;
  }
  .shell { display: flex; flex-direction: column; height: 100vh; }
  .main { display: flex; flex: 1; min-height: 0; }
  .boardcol { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .statusbar {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 12px 18px 14px;
    flex: none;
  }
  .bar { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .live {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--done);
  }
  .live::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--done); animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  @media (prefers-reduced-motion: reduce) { .live::before { animation: none; } }
  .stamp { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .workline {
    font-size: 12px; font-weight: 600; color: #7c3aed;
    max-width: 44%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .workline[hidden] { display: none; }
  .hint { font-size: 12px; color: var(--muted); }
  .chat-toggle {
    margin-left: auto; font: inherit; font-size: 12.5px; font-weight: 600;
    border: 1px solid var(--line-strong); border-radius: 8px;
    background: var(--surface); color: var(--text);
    padding: 4px 12px; cursor: pointer; position: relative;
  }
  .chat-toggle:hover { border-color: var(--accent); }
  .chat-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .chat-toggle[aria-pressed="true"] {
    border-color: var(--accent);
    background: var(--accent-soft);
    box-shadow: inset 0 -2px 0 var(--accent);
  }
  .chat-working {
    display: inline-flex; align-items: center; gap: 6px;
    margin-left: 10px; font-size: 11px; font-weight: 400; color: var(--muted);
    max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .chat-working .dots { display: inline-flex; gap: 3px; flex: none; }
  .chat-working .dots i {
    width: 4px; height: 4px; border-radius: 50%; background: #7c3aed;
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .chat-working .dots i:nth-child(2) { animation-delay: 0.2s; }
  .chat-working .dots i:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
  .chat-badge {
    display: none; position: absolute; top: -7px; right: -7px;
    min-width: 16px; height: 16px; border-radius: 8px; padding: 0 4px;
    background: var(--accent); color: #fff; font-size: 10px; line-height: 16px; text-align: center;
  }
  .chat-badge.on { display: block; }

  .activebar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-top: 10px; padding: 8px 12px; border-radius: 8px;
    border: 1px solid #7c3aed;
    background: color-mix(in srgb, #7c3aed 9%, transparent);
  }
  .activebar.idle { border-color: var(--line); background: var(--bg); }
  .activebar[hidden] { display: none; }
  .active-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: #7c3aed; display: inline-flex; align-items: center; gap: 6px;
  }
  .activebar.idle .active-label { color: var(--muted); }
  .active-label::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%; background: #7c3aed;
    animation: activePulse 2.6s ease-in-out infinite;
  }
  .activebar.idle .active-label::before { background: var(--line-strong); animation: none; }
  @keyframes activePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @media (prefers-reduced-motion: reduce) { .active-label::before { animation: none; } }
  .active-item {
    font: inherit; font-size: 13px; text-align: left; cursor: pointer;
    border: 0; background: none; color: var(--text); padding: 0;
    text-decoration: underline; text-decoration-color: color-mix(in srgb, #7c3aed 45%, transparent);
    text-underline-offset: 3px;
  }
  .active-item:hover { color: #7c3aed; }
  .active-item:focus-visible { outline: 2px solid #7c3aed; outline-offset: 2px; border-radius: 3px; }
  .active-idle-text { font-size: 13px; color: var(--muted); }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; font-size: 12px; color: var(--muted); }
  .key { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { width: 24px; height: 13px; border-radius: 3px; border-left: 3px solid; flex: none; }
  .swatch-active {
    border-color: #7c3aed; background: color-mix(in srgb, #7c3aed 18%, transparent);
    animation: swatchGlow 2.6s ease-in-out infinite;
  }
  @keyframes swatchGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0); }
    50% { box-shadow: 0 0 8px 1px rgba(124, 58, 237, 0.5); }
  }
  .swatch-agent { border-color: #246bfe; background: color-mix(in srgb, #246bfe 16%, transparent); }
  .swatch-user { border-color: #2d7d46; background: color-mix(in srgb, #2d7d46 16%, transparent); }

  /* hamburger, Graph, Chat move as ONE cluster — a long status line may wrap
     the cluster to the next row but can never split it (Evren's report) */
  .bar-actions { margin-left: auto; display: inline-flex; gap: 12px; align-items: baseline; flex: none; }

  .graphpane {
    position: relative; flex: none; height: 280px; min-height: 160px;
    background: var(--bg); border-bottom: 1px solid var(--line);
  }
  .graphpane[hidden] { display: none; }
  .graph-viewport { position: absolute; inset: 0 0 6px 0; overflow: hidden; cursor: grab; touch-action: none; }
  .graph-viewport.dragging { cursor: grabbing; }
  .graph-world { position: absolute; left: 0; top: 0; will-change: transform; }
  .graph-world.gliding { transition: transform 700ms ease; }
  .graph-links { position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none; }
  .gnode {
    position: absolute; width: 200px; box-sizing: border-box;
    border: 1px solid var(--line-strong); border-left-width: 3px; border-radius: 8px;
    background: var(--surface); padding: 7px 10px 8px;
    font-size: 12px; line-height: 1.35; cursor: pointer; user-select: none;
  }
  .gnode:hover { border-color: #7c3aed; }
  .gnode .gtext { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .gnode.by-user { border-left-color: #2d7d46; }
  .gnode.by-agent { border-left-color: #246bfe; }
  .gnode.done { opacity: 0.62; border-left-color: var(--done); }
  .gnode.done .gtext::before { content: "✓ "; color: var(--done); font-weight: 700; }
  .gnode.bucket { border-style: dashed; color: var(--muted); background: var(--bg); }
  .gnode.idle { border-style: dashed; color: var(--muted); background: var(--bg); cursor: default; }
  .gnode.active {
    border-color: #7c3aed; border-left-color: #7c3aed;
    background: color-mix(in srgb, #7c3aed 12%, var(--surface));
    animation: nodeGlow 2.6s ease-in-out infinite;
  }
  @keyframes nodeGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0); }
    50% { box-shadow: 0 0 16px 2px rgba(124, 58, 237, 0.5); }
  }
  .gstub { color: var(--muted); font-size: 11px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gstub.done { text-decoration: line-through; opacity: 0.65; }
  .gstub.done { color: var(--done); }
  .gtag { font-size: 9.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-top: 5px; }
  .gtag.app { color: #d4a017; }
  .gtag.dev { color: #246bfe; }
  .agent-chip {
    position: absolute; z-index: 2; font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
    background: #7c3aed; color: #fff; border-radius: 10px; padding: 2px 9px;
    box-shadow: 0 2px 8px rgba(124, 58, 237, 0.4); pointer-events: none;
  }
  .graph-divider { position: absolute; left: 0; right: 0; bottom: 0; height: 6px; cursor: ns-resize; }
  .graph-divider:hover, .graph-divider.dragging { background: color-mix(in srgb, #7c3aed 30%, transparent); }

  #board { flex: 1; border: 0; width: 100%; background: var(--bg); }
  .artifact-frame {
    width: 100%; height: 78vh; margin-top: 14px;
    border: 1px solid var(--line); border-radius: 8px; background: var(--bg);
  }

  .chatpane {
    width: 340px; flex: none; position: relative;
    border-left: 1px solid var(--line); background: var(--surface);
    display: flex; flex-direction: column; min-height: 0;
  }
  .chat-vdivider { position: absolute; left: -3px; top: 0; bottom: 0; width: 6px; cursor: ew-resize; z-index: 3; }
  .chat-vdivider:hover, .chat-vdivider.dragging { background: color-mix(in srgb, #7c3aed 30%, transparent); }
  .chat-hdivider { flex: none; height: 6px; cursor: ns-resize; }
  .chat-hdivider:hover, .chat-hdivider.dragging { background: color-mix(in srgb, #7c3aed 30%, transparent); }
  .chatpane[hidden] { display: none; }
  .chat-head {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    font-weight: 700; font-size: 13.5px; display: flex; align-items: center;
  }
  .chat-close {
    border: 0; background: none; color: var(--muted);
    font-size: 18px; line-height: 1; cursor: pointer; padding: 2px 6px;
  }
  .chat-close:hover { color: var(--text); }
  .chat-gear {
    border: 0; background: none; color: var(--muted);
    font-size: 14px; line-height: 1; cursor: pointer; padding: 2px 6px;
  }
  /* the whole control cluster sits right as one tight group; margin-left auto
     on the shared class was spreading each button apart (Evren's report).
     The ctx chip owns the push when it is visible, pause takes over when not. */
  .ctx-chip {
    margin-left: auto; margin-right: 2px; font-size: 11px; font-weight: 700;
    color: var(--muted); border: 1px solid var(--line-strong);
    border-radius: 999px; padding: 2px 8px; white-space: nowrap;
  }
  .ctx-chip.warn { color: #bd6f23; border-color: #bd6f23; }
  .ctx-chip.hot { color: #b73d3d; border-color: #b73d3d; }
  .ctx-chip[hidden] { display: none; }
  .ctx-chip[hidden] + .chat-gear { margin-left: auto; }
  .chat-gear:hover, .chat-gear[aria-expanded="true"] { color: var(--text); }
  .chat-settings {
    flex: none; padding: 8px 14px 10px; border-bottom: 1px solid var(--line);
    background: var(--bg); display: flex; flex-direction: column; gap: 8px;
  }
  .chat-settings[hidden] { display: none; }
  .pref-row { display: flex; gap: 8px; align-items: flex-start; font-size: 12px; color: var(--text); cursor: pointer; }
  .pref-row input { margin-top: 1px; accent-color: var(--accent); }
  .pref-warn {
    font: inherit; font-size: 12px; text-align: left; cursor: pointer;
    border: 1px solid #bd6f23; border-radius: 6px; background: transparent;
    color: #bd6f23; padding: 4px 8px;
  }
  .chat-log { flex: 1; overflow-y: auto; padding: 8px 4px; }
  .msg {
    max-width: 86%; margin: 6px 10px; padding: 7px 11px;
    border-radius: 10px; font-size: 13.5px;
    white-space: pre-wrap; overflow-wrap: break-word;
  }
  .msg.user { margin-left: 16%; margin-right: 10px; background: color-mix(in srgb, #2d7d46 26%, var(--surface)); }
  .msg.agent { margin-right: 16%; background: color-mix(in srgb, #246bfe 24%, var(--surface)); }
  .msg + .msg { margin-top: 10px; }
  .msg.system {
    max-width: 100%; margin: 8px 14px; padding: 0; background: none;
    color: var(--muted); font-size: 11.5px; text-align: center;
  }
  .msg time { display: block; margin-top: 2px; font-size: 10px; color: var(--muted); }
  .msg-foot { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
  .msg-foot time { margin: 0 auto 0 0; }
  .msg-seen, .msg-reply {
    font: inherit; font-size: 12px; border: 1px solid color-mix(in srgb, currentColor 35%, transparent);
    border-radius: 6px; background: transparent; color: var(--muted);
    cursor: pointer; padding: 2px 10px; min-height: 24px; opacity: 0.85;
  }
  .msg-seen:hover, .msg-reply:hover { opacity: 1; border-color: currentColor; }
  .msg-seen.on { color: #246bfe; font-weight: 700; opacity: 1; }
  /* a seen message recedes: its fill shifts toward the page background —
     darker blue in dark mode, lighter blue in light mode, per Evren */
  .msg.agent.seen { background: color-mix(in srgb, #246bfe 9%, var(--bg)); }
  .msg.q-next { outline: 2px solid #7c3aed; outline-offset: 2px; }
  .msg a { color: var(--accent); word-break: break-all; }
  .msg-img {
    display: block; max-width: 100%; border-radius: 8px; margin-top: 6px;
    border: 1px solid var(--line); cursor: zoom-in;
    -webkit-user-drag: none; user-select: none;
  }
  .lightbox {
    position: fixed; inset: 0; z-index: 50; background: rgba(10, 12, 11, 0.88);
    display: flex; align-items: center; justify-content: center; cursor: grab; overflow: hidden;
  }
  .lightbox[hidden] { display: none; }
  .lightbox.dragging { cursor: grabbing; }
  .lightbox img { max-width: none; user-select: none; will-change: transform; }
  .lightbox-close {
    position: absolute; top: 14px; right: 18px; z-index: 51;
    font: inherit; font-size: 22px; color: #fff; background: none; border: 0; cursor: pointer; opacity: 0.8;
  }
  .lightbox-close:hover { opacity: 1; }
  .q-options { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .q-btn {
    font: inherit; font-size: 12.5px; padding: 5px 12px; border-radius: 8px;
    border: 1px solid var(--line-strong); background: var(--surface); color: var(--text); cursor: pointer;
  }
  .q-btn:hover:not(:disabled) { border-color: #7c3aed; }
  .q-btn:focus-visible { outline: 2px solid #7c3aed; outline-offset: 2px; }
  .q-btn[aria-pressed="true"] { border-color: #7c3aed; background: color-mix(in srgb, #7c3aed 18%, var(--surface)); font-weight: 600; }
  .q-btn:disabled { opacity: 0.55; cursor: default; }
  .q-send { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .q-note {
    width: 100%; box-sizing: border-box; margin-top: 6px; font: inherit; font-size: 12px;
    padding: 5px 8px; border-radius: 6px; border: 1px solid var(--line); background: var(--bg); color: var(--text);
  }
  .q-done { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .chat-form { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--line); }
  .chat-attach { position: relative; padding: 8px 10px 0; border-top: 1px solid var(--line); }
  .chat-attach img { display: block; max-height: 80px; max-width: 60%; border: 1px solid var(--line); border-radius: 8px; }
  .chat-attach button { position: absolute; top: 2px; left: calc(60% - 6px); width: 22px; height: 22px; border: 1px solid var(--line); border-radius: 50%; background: var(--surface); color: var(--text); cursor: pointer; line-height: 1; }
  .chat-input {
    flex: 1; box-sizing: border-box; font: inherit; font-size: 13.5px; color: var(--text);
    background: var(--bg); border: 1px solid var(--line-strong); border-radius: 8px;
    padding: 7px 10px; resize: none; min-height: 36px; height: 36px; overflow-y: auto;
  }
  .chat-input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .chat-send {
    font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    border: 0; border-radius: 8px; background: var(--accent); color: #fff; padding: 0 14px;
  }
  @media (max-width: 700px) {
    .chatpane { position: fixed; inset: 0 0 0 auto; width: min(340px, 92vw); z-index: 20; box-shadow: -12px 0 32px rgba(0,0,0,0.18); }
  }
</style>
</head>
<body>
<div class="shell">
<!-- header:start -->
  <header class="statusbar">
    <div class="bar">
      <span class="title">Punchlist · status board</span>
      <span class="live" data-local-only>live</span>
      <span class="stamp" id="synced" data-local-only></span>
      <span class="workline" id="workline" data-local-only hidden></span>
      <span class="hint" id="hint">↑↓ browse · Tab indents · Ctrl+Enter completes. Braindump is private until you press “Intake”. “Agent_Active” = in progress.</span>
      <span class="bar-actions" data-local-only><button class="chat-toggle" id="menu-toggle" type="button" title="Show or hide the board sidebar" aria-label="Show or hide the board sidebar">☰</button><button class="chat-toggle" id="graph-toggle" type="button" aria-pressed="false">Graph</button><button class="chat-toggle" id="chat-toggle" type="button" aria-pressed="false">Chat<span class="chat-badge" id="chat-badge"></span></button></span>
    </div>
    <div class="activebar idle" id="activebar">
      <span class="active-label">Active</span>
      <span id="active-items"><span class="active-idle-text">idle — nothing in progress</span></span>
    </div>
    <div class="legend" aria-label="What the row backdrop colors mean">
      <span class="key"><span class="swatch swatch-active"></span>Active — being worked on right now</span>
      <span class="key"><span class="swatch swatch-agent"></span>Added by the agent</span>
      <span class="key"><span class="swatch swatch-user"></span>Added by you</span>
    </div>
  </header>
<!-- header:end -->
  <div class="graphpane" id="graphpane" hidden>
    <div class="graph-viewport" id="graph-viewport">
      <div class="graph-world" id="graph-world"></div>
    </div>
    <div class="graph-divider" id="graph-divider" title="Drag to resize"></div>
  </div>
  <div class="main">
    <div class="boardcol">
      <iframe id="board" title="Punchlist status board"></iframe>
    </div>
    <aside class="chatpane" id="chat" hidden aria-label="Chat with the agent">
      <div class="chat-vdivider" id="chat-vdivider" title="Drag to resize the chat pane"></div>
      <div class="chat-head">Agent chat<span class="chat-working" id="chat-working" hidden><span class="dots"><i></i><i></i><i></i></span><span id="chat-working-text"></span></span><span class="ctx-chip" id="ctx-chip" hidden title="Real context usage from the agent's terminal session"></span><button class="chat-gear" id="chat-pause" type="button" title="Pause the agent: it finishes its current step, then holds until you write resume" aria-label="Pause the agent">⏸</button><button class="chat-gear" id="chat-stop" type="button" title="Stop the agent: it wraps up, logs its state, and goes offline" aria-label="Stop the agent">⏹</button><button class="chat-gear" id="chat-gear" type="button" aria-label="Chat settings" aria-expanded="false">⚙</button><button class="chat-close" id="chat-close" type="button" aria-label="Close chat">×</button></div>
      <div class="chat-settings" id="chat-settings" hidden>
        <label class="pref-row"><input type="checkbox" id="pref-notifications"> Desktop notifications (attention needed, run complete)</label>
        <button class="pref-warn" id="notif-grant" type="button" hidden>Notifications are blocked in this browser — click to allow</button>
        <label class="pref-row"><input type="checkbox" id="pref-fullauto"> Full auto mode — the agent keeps going through the queue on its own, asking only for big decisions</label>
      </div>
      <div class="chat-log" id="chat-log"></div>
      <div class="chat-hdivider" id="chat-hdivider" title="Drag to resize the input area"></div>
      <div class="chat-attach" id="chat-attach" hidden>
        <img id="chat-attach-img" alt="Pasted image, sends with your next message">
        <button type="button" id="chat-attach-remove" aria-label="Remove the pasted image">×</button>
      </div>
      <form class="chat-form" id="chat-form">
        <textarea class="chat-input" id="chat-input" rows="2" placeholder="Message Claude… (Enter sends)"></textarea>
        <button class="chat-send" type="submit">Send</button>
      </form>
    </aside>
  </div>
</div>
<script>
  // Two-way bridge between the embedded board and status/status-board.json,
  // plus a chat channel (status/chat.jsonl through the server) and in-frame
  // decoration: authorship colors and the Braindump intake button.
  const KEY = "scheduling-task-management-board-v1";
  const THEME_KEY = "scheduling-task-management-theme-v1";
  const frame = document.getElementById("board");
  const stamp = document.getElementById("synced");
  let lastCanon = null;
  let pullDeferredSince = null;

  function walkTasks(groups, fn) {
    (groups || []).forEach(function visitGroup(group) {
      (group.tasks || []).forEach(function visit(task) {
        fn(task);
        (task.children || []).forEach(visit);
      });
    });
  }

  // Canonical form for comparison and for what leaves the browser: the app
  // regenerates state.identity (a keypair) on boot, and that key must never
  // land in the shared file — same trust boundary as board exports.
  function canon(text) {
    try {
      const state = JSON.parse(text);
      delete state.identity;
      return JSON.stringify(state);
    } catch {
      return text;
    }
  }

  // Anything created in this browser that carries no authorship yet was made
  // by Evren — tag it before it reaches the shared file, so rows can be
  // colored by who added them. The agent tags its own additions by:"agent".
  function tagUserTasks() {
    const raw = localStorage.getItem(KEY);
    if (raw === null) return null;
    try {
      const state = JSON.parse(raw);
      let changed = false;
      walkTasks(state.groups, (task) => {
        if (!task.by) { task.by = "user"; changed = true; }
      });
      if (!changed) return raw;
      const tagged = JSON.stringify(state);
      localStorage.setItem(KEY, tagged);
      return tagged;
    } catch {
      return raw;
    }
  }

  function applyTheme() {
    document.documentElement.dataset.theme =
      localStorage.getItem(THEME_KEY) === "dark" ? "dark" : "light";
  }

  function mark(word) {
    stamp.textContent = word + " " + new Date().toLocaleTimeString();
  }

  // ---- In-frame decoration -------------------------------------------------

  const FRAME_CSS = `
    .task-row.by-user { box-shadow: inset 3px 0 0 #2d7d46; background-color: color-mix(in srgb, #2d7d46 12%, transparent); }
    .task-row.by-agent { box-shadow: inset 3px 0 0 #246bfe; background-color: color-mix(in srgb, #246bfe 12%, transparent); }
    .task-row.working {
      box-shadow: inset 3px 0 0 #7c3aed;
      background-color: color-mix(in srgb, #7c3aed 12%, transparent) !important;
      animation: statusGlow 2.6s ease-in-out infinite;
    }
    @keyframes statusGlow {
      0%, 100% { box-shadow: inset 3px 0 0 #7c3aed, 0 0 0 0 rgba(124, 58, 237, 0); }
      50% { box-shadow: inset 3px 0 0 #7c3aed, 0 0 14px 2px rgba(124, 58, 237, 0.45); }
    }
    .jump-flash { outline: 2px solid #7c3aed; outline-offset: 2px; }
    .intake-btn {
      margin-left: 10px; font: inherit; font-size: 11px; font-weight: 600;
      padding: 2px 9px; border-radius: 6px; border: 1px solid currentColor;
      background: transparent; color: inherit; cursor: pointer; opacity: 0.7;
      flex: none; vertical-align: middle;
    }
    .intake-btn:hover { opacity: 1; }
    .intake-btn.glowing {
      opacity: 1; color: #7c3aed; border-color: #7c3aed; cursor: default;
      animation: statusGlow 1.6s ease-in-out infinite;
    }
    /* No reduced-motion override here on purpose: Evren runs Windows with
       reduced motion on, and he explicitly asked for these two glows. */
  `;

  let intakeRunning = false;

  function readBoardState() {
    try { return JSON.parse(localStorage.getItem(KEY) || "null"); } catch { return null; }
  }

  function activeTasks(state) {
    const found = [];
    if (state) walkTasks(state.groups, (task) => { if (task.active && !task.done) found.push(task); });
    return found;
  }

  // A clicked node may live under collapsed parents (grayed done items under
  // the Completed holder, most often) — expand the chain via the app's own
  // chevrons so the jump actually lands (Evren 2026-07-18).
  function expandTowards(id) {
    const state = readBoardState();
    const doc = frame.contentDocument;
    if (!state || !doc) return;
    const chain = [];
    let ownerGroup = null;
    const walk = (tasks, trail) => {
      for (const t of tasks) {
        if (t.id === id) { chain.push(...trail); return true; }
        if (walk(t.children || [], [...trail, t.id])) return true;
      }
      return false;
    };
    for (const g of state.groups) if (walk(g.tasks, [])) { ownerGroup = g; break; }
    if (ownerGroup && ownerGroup.collapsed) {
      doc.querySelector('[data-group-row="' + ownerGroup.id + '"]')
        ?.querySelector('[data-action="toggle-group"]')?.click();
    }
    for (const ancestorId of chain) {
      if (doc.querySelector('[data-task-row="' + id + '"]')) return;
      doc.querySelector('[data-task-row="' + ancestorId + '"]')
        ?.querySelector('[data-action="toggle-task"]')?.click();
    }
  }

  function jumpToTask(id) {
    const doc = frame.contentDocument;
    let row = doc && doc.querySelector('[data-task-row="' + id + '"]');
    if (!row) {
      // retention-hidden completed tasks never render in the outline; their
      // home is the Completed section — open it and land on the entry there
      // (checked BEFORE expanding parents, which would mutate collapse state
      // for nothing)
      const restore = doc && doc.querySelector('[data-action="restore-completed"][data-task-id="' + id + '"]');
      const section = restore && restore.closest("[data-completed-section]");
      if (section) section.open = true;
      row = restore && restore.closest(".lifecycle-row");
    }
    if (!row) {
      expandTowards(id);
      row = doc && doc.querySelector('[data-task-row="' + id + '"]');
    }
    if (!row) return;
    row.scrollIntoView({ behavior: "smooth", block: "center" });
    row.classList.add("jump-flash");
    setTimeout(() => row.classList.remove("jump-flash"), 2000);
  }

  function renderActiveBar(state) {
    const bar = document.getElementById("activebar");
    const slot = document.getElementById("active-items");
    const tasks = activeTasks(state);
    bar.classList.toggle("idle", tasks.length === 0);
    slot.innerHTML = "";
    if (tasks.length === 0) {
      const idle = document.createElement("span");
      idle.className = "active-idle-text";
      idle.textContent = "idle — nothing in progress";
      slot.appendChild(idle);
      return;
    }
    tasks.forEach((task, index) => {
      if (index) slot.appendChild(document.createTextNode(" · "));
      const link = document.createElement("button");
      link.type = "button";
      link.className = "active-item";
      link.textContent = task.text.length > 110 ? task.text.slice(0, 110) + "…" : task.text;
      link.addEventListener("click", () => jumpToTask(task.id));
      slot.appendChild(link);
    });
  }

  function braindumpCount(state) {
    const group = state && state.groups.find((g) => g.id === "group-braindump");
    return group ? group.tasks.length : 0;
  }

  function decorateFrame() {
    const doc = frame.contentDocument;
    if (!doc || !doc.body) return;
    if (!doc.getElementById("status-inject-style")) {
      const style = doc.createElement("style");
      style.id = "status-inject-style";
      style.textContent = FRAME_CSS;
      doc.head.appendChild(style);
    }
    // Tag before reading: the app's saves strip authorship from tasks created
    // this session, and reading the untagged snapshot was the green flash.
    tagUserTasks();
    const state = readBoardState();
    renderActiveBar(state);
    const byId = {};
    const workingIds = new Set();
    if (state) walkTasks(state.groups, (task) => {
      byId[task.id] = task.by || "";
      if (task.active && !task.done) workingIds.add(task.id);
    });
    doc.querySelectorAll("[data-task-row]").forEach((row) => {
      const id = row.getAttribute("data-task-row");
      if (!(id in byId) || !byId[id]) return; // unknown or untagged snapshot: never strip, only add
      row.classList.toggle("by-user", byId[id] === "user");
      row.classList.toggle("by-agent", byId[id] === "agent");
      row.classList.toggle("working", workingIds.has(id));
    });
    // The app re-renders its DOM wholesale, so the intake button is re-created
    // every pass and its in-progress state re-applied from the wrapper's flag.
    if (intakeRunning && braindumpCount(state) === 0) intakeRunning = false;
    const title = doc.querySelector('[data-group-title="group-braindump"]');
    if (title) {
      let button = title.parentElement.querySelector(".intake-btn");
      if (!button) {
        button = doc.createElement("button");
        button.type = "button";
        button.className = "intake-btn";
        button.addEventListener("click", async (event) => {
          event.preventDefault();
          event.stopPropagation();
          if (intakeRunning) return;
          if (braindumpCount(readBoardState()) === 0) {
            button.textContent = "Braindump is empty";
            setTimeout(() => { button.textContent = "Intake braindump"; }, 3000);
            return;
          }
          intakeRunning = true;
          decorateFrame();
          try { await fetch("/intake", { method: "POST" }); } catch {}
        }, true);
        title.insertAdjacentElement("afterend", button);
      }
      button.classList.toggle("glowing", intakeRunning);
      // Only write when changed: assigning identical textContent still emits a
      // mutation record, and with the synchronous observer that was a hang.
      const label = intakeRunning ? "Intaking braindump…" : (button.textContent === "Braindump is empty" ? "Braindump is empty" : "Intake braindump");
      if (button.textContent !== label) button.textContent = label;
    }
  }

  let decorating = false;
  function queueDecorate() {
    // Synchronous, not rAF: the observer's microtask runs before the browser
    // paints the app's fresh render, so classes land with zero flashed frames.
    // The guard stops recursion from decorate's own class mutations.
    if (decorating) return;
    decorating = true;
    try { decorateFrame(); } finally { decorating = false; }
  }

  frame.addEventListener("load", () => {
    decorateFrame();
    const doc = frame.contentDocument;
    if (doc && doc.body) new MutationObserver(queueDecorate).observe(doc.body, { childList: true, subtree: true });
  });

  // ---- Execution graph -------------------------------------------------------
  // Grill Q14–Q20: live-state thread (completed → active → queue), forks at
  // equal priority, agent chips from the heartbeat registry, pan + click-jump,
  // auto-recenter after 15 s idle, resizable via the bottom divider.

  const graphPane = document.getElementById("graphpane");
  const graphWorld = document.getElementById("graph-world");
  const graphViewport = document.getElementById("graph-viewport");
  const GRAPH_OPEN_KEY = "punchlist-status-graph-open";
  const GRAPH_H_KEY = "punchlist-status-graph-height";
  const GRAPH_Z_KEY = "punchlist-status-graph-zoom";
  let agentsLive = [];
  let graphKey = "";
  let graphPan = { x: 30, y: 10 };
  let lastGraphInteract = 0;
  let activeNodeCenter = null;
  // Semantic zoom (Evren's spec): geometry scales, text size stays constant,
  // so zooming in shows MORE text per block rather than bigger letters.
  let graphZoom = Math.min(2, Math.max(0.6, Number(localStorage.getItem(GRAPH_Z_KEY)) || 1));

  function nodeOf(task, kind) {
    const kids = task.children || [];
    return {
      id: task.id, text: task.text || "(untitled)", kind, by: task.by || "",
      lane: task.lane === "dev" ? "dev" : "app",
      stubs: kids.slice(0, 24).map((c) => ({ text: c.text, done: Boolean(c.done) })),
      more: Math.max(0, kids.length - 24),
    };
  }

  function buildGraphModel(state) {
    const cols = [];
    const branch = [];
    const inbox = state.groups.find((g) => g.id === "group-inbox");
    if (!inbox) return { cols, branch };
    const actives = [];
    walkTasks(state.groups, (t) => { if (t.active && !t.done) actives.push(t); });
    const activeIds = new Set(actives.map((t) => t.id));
    const holder = inbox.tasks.find((t) => t.id === "task-agent-completed");
    // Everything completed rides the main line; the side branch is reserved
    // for true forks (Evren 2026-07-18: unrelated items were stacking under
    // whatever happened to be active).
    (holder ? holder.children : []).filter((t) => t.completedAt)
      .sort((a, b) => (a.completedAt < b.completedAt ? -1 : 1)).slice(-5)
      .forEach((t) => cols.push([nodeOf(t, "done")]));
    cols.push(actives.length ? actives.map((t) => nodeOf(t, "active"))
      : [{ id: null, text: "idle — nothing active", kind: "idle", by: "", stubs: [], more: 0 }]);
    // Branch = ONLY items explicitly spawned under an active item
    // (createdUnderTaskId). The inserted flag no longer routes here — agents
    // set it on every priority insertion, related or not, and the graph was
    // attaching everything to the active node.
    inbox.tasks.filter((t) => !t.done && t.id !== "task-agent-completed" && !t.active)
      .forEach((t) => {
        if (t.createdUnderTaskId && activeIds.has(t.createdUnderTaskId)) branch.push(nodeOf(t, "queue"));
        else cols.push([nodeOf(t, "queue")]);
      });
    const dirA = state.groups.find((g) => g.id === "group-dir-a");
    const friction = dirA && dirA.tasks.find((t) => (t.text || "").startsWith("Friction list"));
    let expandedFork = false;
    (friction ? friction.children : []).filter((p) => /^P\d/.test(p.text || "")).forEach((level) => {
      const open = (level.children || []).filter((c) => !c.done);
      if (!open.length) return;
      if (!expandedFork) { cols.push(open.map((c) => nodeOf(c, "queue"))); expandedFork = true; }
      else cols.push([{ id: level.id, text: level.text + " — " + open.length + " open", kind: "bucket", by: level.by || "", lane: "app", stubs: open.slice(0, 24).map((c) => ({ text: c.text, done: false })), more: Math.max(0, open.length - 24) }]);
    });
    return { cols, branch };
  }

  function renderGraph(force) {
    if (graphPane.hidden) return;
    const state = readBoardState();
    if (!state) return;
    const model = buildGraphModel(state);
    const cols = model.cols;
    const branch = model.branch;
    const key = JSON.stringify(model) + "|" + JSON.stringify(agentsLive);
    if (!force && key === graphKey) return;
    graphKey = key;
    graphWorld.innerHTML = "";
    activeNodeCenter = null;
    const Z = graphZoom;
    const NODE_W = Math.round(200 * Z), COL_STEP = Math.round(270 * Z), GAP = Math.round(18 * Z);
    const MID = Math.max(120, (graphPane.clientHeight - 6) / 2);
    // near max zoom everything shows: no clamps, no "+N more" (Evren's spec)
    const maxZoom = Z >= 1.8;
    const stubBudget = maxZoom ? Infinity : Z < 0.75 ? 0 : Math.max(1, Math.round(3 * Z));
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.classList.add("graph-links");
    graphWorld.appendChild(svg);
    function buildNodeEl(node) {
      const el = document.createElement("div");
      el.className = "gnode " + node.kind + (node.by === "user" ? " by-user" : node.by === "agent" ? " by-agent" : "");
      el.style.width = NODE_W + "px";
      if (node.id) el.dataset.taskId = node.id;
      const text = document.createElement("div");
      text.className = "gtext";
      text.style.webkitLineClamp = maxZoom ? "unset" : String(Math.max(1, Math.round(3 * Z)));
      text.textContent = node.text;
      el.appendChild(text);
      const visible = Math.min(node.stubs.length, stubBudget);
      node.stubs.slice(0, visible).forEach((stub) => {
        const s = document.createElement("div");
        s.className = "gstub" + (stub.done ? " done" : "");
        s.textContent = (stub.done ? "✓ " : "↳ ") + stub.text;
        el.appendChild(s);
      });
      const hiddenCount = node.stubs.length - visible + node.more;
      if (hiddenCount > 0 && stubBudget > 0) {
        const s = document.createElement("div");
        s.className = "gstub";
        s.textContent = "↳ +" + hiddenCount + " more";
        el.appendChild(s);
      }
      if (node.kind !== "idle") {
        const tag = document.createElement("div");
        tag.className = "gtag " + node.lane;
        tag.textContent = node.lane === "dev" ? "development interface" : "app";
        el.appendChild(tag);
      }
      graphWorld.appendChild(el);
      return el;
    }
    const placed = [];
    cols.forEach((col, i) => {
      const x = 30 + i * COL_STEP;
      const els = col.map((node) => {
        const el = buildNodeEl(node);
        el.style.left = x + "px";
        return { node, el };
      });
      let total = els.reduce((sum, p) => sum + p.el.offsetHeight, 0) + (els.length - 1) * GAP;
      let y = Math.max(12, MID - total / 2);
      els.forEach((p) => {
        p.el.style.top = y + "px";
        p.cx = x; p.cy = y + p.el.offsetHeight / 2; p.h = p.el.offsetHeight;
        if (p.node.kind === "active" && !activeNodeCenter) activeNodeCenter = { x: x + NODE_W / 2, y: p.cy };
        y += p.el.offsetHeight + GAP;
      });
      placed.push(els);
    });
    let maxY = 0;
    placed.flat().forEach((p) => { maxY = Math.max(maxY, p.cy + p.h / 2); });
    const worldW = 30 + cols.length * COL_STEP + 60;
    const worldH = maxY + 40;
    graphWorld.style.width = worldW + "px";
    graphWorld.style.height = worldH + "px";
    svg.setAttribute("width", worldW);
    svg.setAttribute("height", worldH);
    for (let i = 0; i < placed.length - 1; i++) {
      const from = placed[i], to = placed[i + 1];
      const pairs = from.length === 1 ? to.map((t) => [from[0], t])
        : to.length === 1 ? from.map((f) => [f, to[0]])
        : from.map((f, k) => [f, to[Math.min(k, to.length - 1)]]);
      pairs.forEach(([f, t]) => {
        const hot = f.node.kind === "active" || t.node.kind === "active";
        const x1 = f.cx + NODE_W, y1 = f.cy, x2 = t.cx, y2 = t.cy;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M ${x1} ${y1} C ${x1 + 34} ${y1}, ${x2 - 34} ${y2}, ${x2} ${y2}`);
        path.setAttribute("fill", "none");
        // style, not attribute: SVG presentation attributes can't resolve var()
        path.style.stroke = hot ? "#7c3aed" : "var(--line-strong)";
        path.setAttribute("stroke-width", hot ? "2.5" : "1.5");
        svg.appendChild(path);
      });
    }
    // Open branch below the main line (Evren's spec, 2026-07-17): inserted
    // items hang off the active node's right SIDE, run as their own row, and
    // just end — no merge back.
    // ponytail: one branch row today; when multiple branches can collide, the
    // left-most one moves a row down (his stacking rule) — implement then.
    const branchPlaced = [];
    // the branch hangs off the active node, or the idle node when nothing runs
    const activePlaced = placed.flat().find((p) => p.node.kind === "active")
      || placed.flat().find((p) => p.node.kind === "idle");
    if (branch.length && activePlaced) {
      const startX = activePlaced.cx + NODE_W + Math.round(44 * Z);
      const branchTop = activePlaced.cy + activePlaced.h / 2 + Math.round(56 * Z);
      let prev = null;
      branch.forEach((node, index) => {
        const el = buildNodeEl(node);
        const bx = startX + index * COL_STEP;
        el.style.left = bx + "px";
        el.style.top = branchTop + "px";
        const cy = branchTop + el.offsetHeight / 2;
        const x1 = index === 0 ? activePlaced.cx + NODE_W : prev.bx + NODE_W;
        const y1 = index === 0 ? activePlaced.cy + activePlaced.h / 4 : prev.cy;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M ${x1} ${y1} C ${x1 + 30} ${y1}, ${bx - 30} ${cy}, ${bx} ${cy}`);
        path.setAttribute("fill", "none");
        path.style.stroke = "#7c3aed";
        path.setAttribute("stroke-width", "2.5");
        svg.appendChild(path);
        prev = { bx, cy };
        branchPlaced.push({ node, el, cx: bx, cy, h: el.offsetHeight });
      });
      const branchBottom = Math.max(...branchPlaced.map((p) => p.cy + p.h / 2)) + 40;
      const branchRight = startX + branch.length * COL_STEP + 60;
      const newW = Math.max(parseInt(graphWorld.style.width) || 0, branchRight);
      const newH = Math.max(parseInt(graphWorld.style.height) || 0, branchBottom);
      graphWorld.style.width = newW + "px";
      graphWorld.style.height = newH + "px";
      svg.setAttribute("width", newW);
      svg.setAttribute("height", newH);
    }
    agentsLive.forEach((agent, index) => {
      const chip = document.createElement("div");
      chip.className = "agent-chip";
      chip.textContent = agent.name;
      const host = placed.flat().concat(branchPlaced).find((p) => p.node.id === agent.taskId);
      if (host) {
        chip.style.left = (host.cx + 8 + index * 4) + "px";
        chip.style.top = (host.cy - host.h / 2 - 10) + "px";
      } else {
        chip.style.left = "8px";
        chip.style.top = (6 + index * 20) + "px";
        chip.textContent = agent.name + " · off-graph task";
      }
      graphWorld.appendChild(chip);
    });
    applyGraphPan(false);
  }

  function applyGraphPan(glide) {
    graphWorld.classList.toggle("gliding", Boolean(glide));
    graphWorld.style.transform = `translate(${graphPan.x}px, ${graphPan.y}px)`;
    if (glide) setTimeout(() => graphWorld.classList.remove("gliding"), 750);
  }

  function centerGraphOnActive(glide) {
    if (!activeNodeCenter) return;
    const targetX = graphViewport.clientWidth / 2 - activeNodeCenter.x;
    const targetY = (graphPane.clientHeight - 6) / 2 - activeNodeCenter.y;
    if (Math.abs(targetX - graphPan.x) < 4 && Math.abs(targetY - graphPan.y) < 4) return;
    graphPan = { x: targetX, y: targetY };
    applyGraphPan(glide);
  }

  function setGraphOpen(open) {
    graphPane.hidden = !open;
    document.getElementById("activebar").hidden = open;
    document.getElementById("graph-toggle").setAttribute("aria-pressed", open ? "true" : "false");
    localStorage.setItem(GRAPH_OPEN_KEY, open ? "1" : "0");
    if (open) { renderGraph(true); centerGraphOnActive(false); }
  }
  document.getElementById("graph-toggle").addEventListener("click", () => setGraphOpen(graphPane.hidden));

  (() => {
    const height = Number(localStorage.getItem(GRAPH_H_KEY));
    if (height >= 160) graphPane.style.height = height + "px";
    if (localStorage.getItem(GRAPH_OPEN_KEY) === "1") setGraphOpen(true);
  })();

  (() => {
    let drag = null;
    graphViewport.addEventListener("pointerdown", (event) => {
      drag = { x: event.clientX, y: event.clientY, panX: graphPan.x, panY: graphPan.y, moved: false, target: event.target };
      graphViewport.setPointerCapture(event.pointerId);
      graphViewport.classList.add("dragging");
      lastGraphInteract = Date.now();
    });
    graphViewport.addEventListener("pointermove", (event) => {
      if (!drag) return;
      const dx = event.clientX - drag.x, dy = event.clientY - drag.y;
      if (Math.abs(dx) + Math.abs(dy) > 4) drag.moved = true;
      graphPan = { x: drag.panX + dx, y: drag.panY + dy };
      applyGraphPan(false);
      lastGraphInteract = Date.now();
    });
    graphViewport.addEventListener("pointerup", () => {
      if (drag && !drag.moved) {
        const node = drag.target.closest(".gnode");
        if (node && node.dataset.taskId) jumpToTask(node.dataset.taskId);
      }
      drag = null;
      graphViewport.classList.remove("dragging");
      lastGraphInteract = Date.now();
    });
    let wheelQueued = false;
    graphViewport.addEventListener("wheel", (event) => {
      event.preventDefault();
      const rect = graphViewport.getBoundingClientRect();
      const cx = event.clientX - rect.left, cy = event.clientY - rect.top;
      const previous = graphZoom;
      graphZoom = Math.min(2, Math.max(0.6, graphZoom * (event.deltaY < 0 ? 1.12 : 1 / 1.12)));
      if (graphZoom === previous) return;
      const scale = graphZoom / previous;
      graphPan = { x: cx - (cx - graphPan.x) * scale, y: cy - (cy - graphPan.y) * scale };
      localStorage.setItem(GRAPH_Z_KEY, String(graphZoom));
      lastGraphInteract = Date.now();
      if (!wheelQueued) {
        wheelQueued = true;
        requestAnimationFrame(() => { wheelQueued = false; renderGraph(true); });
      }
    }, { passive: false });
    const divider = document.getElementById("graph-divider");
    let resize = null;
    divider.addEventListener("pointerdown", (event) => {
      resize = { y: event.clientY, h: graphPane.clientHeight };
      divider.setPointerCapture(event.pointerId);
      divider.classList.add("dragging");
    });
    divider.addEventListener("pointermove", (event) => {
      if (!resize) return;
      const h = Math.min(Math.round(window.innerHeight * 0.6), Math.max(160, resize.h + event.clientY - resize.y));
      graphPane.style.height = h + "px";
      lastGraphInteract = Date.now();
    });
    divider.addEventListener("pointerup", () => {
      resize = null;
      divider.classList.remove("dragging");
      localStorage.setItem(GRAPH_H_KEY, String(graphPane.clientHeight));
      renderGraph(true);
    });
  })();

  function formatElapsed(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + "s";
    if (s < 3600) return Math.floor(s / 60) + "m " + String(s % 60).padStart(2, "0") + "s";
    return Math.floor(s / 3600) + "h " + String(Math.floor((s % 3600) / 60)).padStart(2, "0") + "m";
  }

  function updateWorkingIndicator() {
    const wrap = document.getElementById("chat-working");
    const text = document.getElementById("chat-working-text");
    const workline = document.getElementById("workline");
    if (!agentsLive.length) { wrap.hidden = true; workline.hidden = true; return; }
    const state = readBoardState();
    const names = {};
    if (state) walkTasks(state.groups, (t) => { names[t.id] = t.text; });
    const agent = agentsLive[0];
    const parts = [
      agent.name,
      names[agent.taskId] ? names[agent.taskId].slice(0, 44) : "working",
      agent.since ? formatElapsed(Date.now() - agent.since) : null,
      agent.status || null,
    ].filter(Boolean);
    text.textContent = parts.join(" · ");
    wrap.hidden = false;
    workline.textContent = "⚡ " + parts.join(" · ");
    workline.title = parts.join(" · ");
    workline.hidden = false;
  }

  // Real context numbers, written by status/statusline.mjs from the Claude
  // Code statusline payload. Stale or missing file = chip hides; the page
  // never invents a number.
  async function pollCtx() {
    const chip = document.getElementById("ctx-chip");
    try {
      const response = await fetch("/ctx", { cache: "no-store" });
      if (!response.ok) throw new Error();
      const ctx = await response.json();
      if (Date.now() - (ctx.at || 0) > 180000) throw new Error();
      chip.textContent = "ctx " + ctx.usedPercentage + "%";
      chip.classList.toggle("warn", ctx.usedPercentage >= 70 && ctx.usedPercentage < 90);
      chip.classList.toggle("hot", ctx.usedPercentage >= 90);
      chip.hidden = false;
    } catch {
      chip.hidden = true;
    }
  }

  async function pollAgents() {
    try {
      const response = await fetch("/agents", { cache: "no-store" });
      if (!response.ok) return;
      const fresh = await response.json();
      if (JSON.stringify(fresh) !== JSON.stringify(agentsLive)) {
        const hadAgents = agentsLive.length > 0;
        agentsLive = fresh;
        renderGraph(true);
        if (hadAgents && fresh.length === 0) notify("Run complete", "The agent finished its current work", true);
      }
      agentPollFails = 0;
      updateWorkingIndicator();
    } catch {
      // a dead server must not leave the dots blinking "running" forever
      if (++agentPollFails >= 3 && agentsLive.length) {
        agentsLive = [];
        renderGraph(true);
        updateWorkingIndicator();
      }
    }
  }
  let agentPollFails = 0;

  function graphTick() {
    if (graphPane.hidden) return;
    renderGraph(false);
    if (Date.now() - lastGraphInteract > 15000) centerGraphOnActive(true);
  }

  // ---- Chat ------------------------------------------------------------------

  const chatPane = document.getElementById("chat");
  const chatLog = document.getElementById("chat-log");
  const chatBadge = document.getElementById("chat-badge");
  const chatInput = document.getElementById("chat-input");
  const CHAT_SEEN_KEY = "punchlist-status-chat-seen";
  const CHAT_MARKS_KEY = "punchlist-status-chat-seen-marks";
  const chatSeenMarks = new Set(JSON.parse(localStorage.getItem(CHAT_MARKS_KEY) || "[]"));
  let chatCount = 0;
  let chatSeen = Number(localStorage.getItem(CHAT_SEEN_KEY)) || 0;

  function markChatSeen() {
    chatSeen = chatCount;
    localStorage.setItem(CHAT_SEEN_KEY, String(chatSeen));
    chatBadge.classList.remove("on");
  }

  const questionPicks = new Map();
  const questionNotes = new Map();

  // Lightbox for chat images: wheel zooms around the cursor, drag pans,
  // Esc or clicking the backdrop closes — same manners as the app's own.
  let lightbox = null;
  function openLightbox(src) {
    if (lightbox) lightbox.remove();
    lightbox = document.createElement("div");
    lightbox.className = "lightbox";
    const image = document.createElement("img");
    image.src = src;
    image.draggable = false;
    let scale = 1, tx = 0, ty = 0;
    const apply = () => { image.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`; };
    image.addEventListener("load", () => {
      scale = Math.min(1, (innerWidth * 0.9) / image.naturalWidth, (innerHeight * 0.9) / image.naturalHeight);
      apply();
    });
    const close = document.createElement("button");
    close.className = "lightbox-close";
    close.textContent = "×";
    close.setAttribute("aria-label", "Close image");
    const dismiss = () => { lightbox.remove(); lightbox = null; document.removeEventListener("keydown", onKey); };
    const onKey = (event) => { if (event.key === "Escape") dismiss(); };
    close.addEventListener("click", dismiss);
    lightbox.addEventListener("click", (event) => { if (event.target === lightbox) dismiss(); });
    document.addEventListener("keydown", onKey);
    lightbox.addEventListener("wheel", (event) => {
      event.preventDefault();
      const factor = event.deltaY < 0 ? 1.15 : 1 / 1.15;
      const next = Math.min(8, Math.max(0.1, scale * factor));
      const cx = event.clientX - innerWidth / 2, cy = event.clientY - innerHeight / 2;
      tx = cx - (cx - tx) * (next / scale);
      ty = cy - (cy - ty) * (next / scale);
      scale = next;
      apply();
    }, { passive: false });
    let drag = null;
    lightbox.addEventListener("pointerdown", (event) => {
      drag = { x: event.clientX, y: event.clientY, tx, ty };
      lightbox.setPointerCapture(event.pointerId);
      lightbox.classList.add("dragging");
    });
    lightbox.addEventListener("pointermove", (event) => {
      if (!drag) return;
      if (event.buttons === 0) { drag = null; lightbox.classList.remove("dragging"); return; } // button released off-window: never stick to the cursor
      tx = drag.tx + event.clientX - drag.x;
      ty = drag.ty + event.clientY - drag.y;
      apply();
    });
    lightbox.addEventListener("pointerup", () => { drag = null; lightbox.classList.remove("dragging"); });
    lightbox.addEventListener("pointercancel", () => { drag = null; lightbox.classList.remove("dragging"); });
    lightbox.appendChild(image);
    lightbox.appendChild(close);
    document.body.appendChild(lightbox);
  }

  function renderMessageText(container, text) {
    const urlPattern = /https?:\/\/[^\s]+/g;
    let last = 0;
    let match;
    while ((match = urlPattern.exec(text))) {
      if (match.index > last) container.appendChild(document.createTextNode(text.slice(last, match.index)));
      const link = document.createElement("a");
      link.href = match[0];
      link.textContent = match[0];
      link.target = "_blank";
      link.rel = "noopener";
      container.appendChild(link);
      last = match.index + match[0].length;
    }
    container.appendChild(document.createTextNode(text.slice(last)));
  }

  function highlightNextQuestion(answeredAt) {
    const cards = [...chatLog.querySelectorAll("[data-unanswered='1']")];
    if (!cards.length) return;
    // the next open question after the one just answered; answering out of
    // order falls back to the nearest one above (his spec)
    const next = cards.find((card) => card.dataset.questionAt > answeredAt) || cards.at(-1);
    next.scrollIntoView({ behavior: "smooth", block: "center" });
    next.classList.add("q-next");
    setTimeout(() => next.classList.remove("q-next"), 1800);
  }

  async function sendAnswer(answerTo, text) {
    try {
      await fetch("/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ from: "user", text, answerTo }),
      });
      await pollChat();
    } catch {}
  }

  function renderChat(lines) {
    const entries = lines.map((line) => { try { return JSON.parse(line); } catch { return null; } }).filter(Boolean);
    const answered = new Set(entries.filter((e) => e.answerTo).map((e) => e.answerTo));
    // keep the reader's place: only auto-scroll when they were already at the
    // bottom, and never touch scroll while the pane is hidden (its metrics
    // read 0 and restoring them later threw the view to the top).
    const hidden = chatPane.hidden;
    const nearBottom = chatLog.scrollTop + chatLog.clientHeight >= chatLog.scrollHeight - 48;
    const keepScroll = chatLog.scrollTop;
    chatLog.innerHTML = "";
    entries.forEach((entry) => {
      const div = document.createElement("div");
      div.className = "msg " + (entry.from === "user" ? "user" : entry.from === "agent" ? "agent" : "system");
      renderMessageText(div, entry.text);
      if (entry.img) {
        const image = document.createElement("img");
        image.className = "msg-img";
        image.src = entry.img;
        image.loading = "lazy";
        image.draggable = false;
        image.title = "Double click to enlarge";
        image.addEventListener("dblclick", () => openLightbox(entry.img));
        div.appendChild(image);
      }
      if (entry.question && entry.from === "agent") {
        // Evren's card spec (2026-07-17): picking an option must not fire the
        // answer — he can still add a comment under it, or skip the options
        // and write his own; answering highlights the next open question.
        const isAnswered = answered.has(entry.at);
        div.dataset.questionAt = entry.at;
        if (!isAnswered) div.dataset.unanswered = "1";
        const picks = questionPicks.get(entry.at) || new Set();
        const wrap = document.createElement("div");
        wrap.className = "q-options";
        entry.question.options.forEach((option) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "q-btn";
          button.textContent = option;
          button.disabled = isAnswered;
          button.setAttribute("aria-pressed", picks.has(option) ? "true" : "false");
          if (!isAnswered) button.addEventListener("click", () => {
            if (entry.question.multi) picks.has(option) ? picks.delete(option) : picks.add(option);
            else if (picks.has(option)) picks.clear();
            else { picks.clear(); picks.add(option); }
            questionPicks.set(entry.at, picks);
            [...wrap.querySelectorAll(".q-btn")].forEach((b) => b.setAttribute("aria-pressed", picks.has(b.textContent) ? "true" : "false"));
          });
          wrap.appendChild(button);
        });
        div.appendChild(wrap);
        if (!isAnswered) {
          const note = document.createElement("input");
          note.className = "q-note";
          note.placeholder = "Add a comment, or write your own answer";
          note.value = questionNotes.get(entry.at) || "";
          note.addEventListener("input", () => questionNotes.set(entry.at, note.value));
          div.appendChild(note);
          const sendWrap = document.createElement("div");
          sendWrap.className = "q-options";
          const send = document.createElement("button");
          send.type = "button";
          send.className = "q-btn q-send";
          send.textContent = "Send answer";
          send.addEventListener("click", () => {
            const chosen = [...(questionPicks.get(entry.at) || [])];
            const noteText = (questionNotes.get(entry.at) || "").trim();
            if (!chosen.length && !noteText) return;
            const text = chosen.length
              ? chosen.join("; ") + (noteText ? ". Note: " + noteText : "")
              : noteText;
            sendAnswer(entry.at, text).then(() => highlightNextQuestion(entry.at));
          });
          note.addEventListener("keydown", (event) => {
            if (event.key === "Enter") { event.preventDefault(); send.click(); }
          });
          sendWrap.appendChild(send);
          div.appendChild(sendWrap);
        }
        if (isAnswered) {
          const done = document.createElement("div");
          done.className = "q-done";
          done.textContent = "answered";
          div.appendChild(done);
        }
      }
      const timeEl = entry.from !== "system" && entry.at ? document.createElement("time") : null;
      if (timeEl) timeEl.textContent = new Date(entry.at).toLocaleTimeString();
      // user messages keep the time on its own line; agent messages fold it
      // into the seen/reply row below (his note: wasted space)
      if (timeEl && entry.from !== "agent") div.appendChild(timeEl);
      // Agent messages carry a private read-marker and a reply hook
      // (Evren's asks, 2026-07-17): "seen" flips gray to blue, for his eyes
      // only; "reply" quotes the message into the input.
      if (entry.from === "agent" && entry.at) {
        if (chatSeenMarks.has(entry.at)) div.classList.add("seen");
        const foot = document.createElement("div");
        foot.className = "msg-foot";
        if (timeEl) foot.appendChild(timeEl);
        const seen = document.createElement("button");
        seen.type = "button";
        seen.className = "msg-seen" + (chatSeenMarks.has(entry.at) ? " on" : "");
        seen.textContent = "seen";
        const toggleSeen = () => {
          chatSeenMarks.has(entry.at) ? chatSeenMarks.delete(entry.at) : chatSeenMarks.add(entry.at);
          localStorage.setItem(CHAT_MARKS_KEY, JSON.stringify([...chatSeenMarks]));
          seen.classList.toggle("on", chatSeenMarks.has(entry.at));
          div.classList.toggle("seen", chatSeenMarks.has(entry.at));
        };
        seen.addEventListener("click", toggleSeen);
        div.addEventListener("dblclick", (event) => {
          if (!event.target.closest("a, img, button, input")) toggleSeen();
        });
        const reply = document.createElement("button");
        reply.type = "button";
        reply.className = "msg-reply";
        reply.textContent = "reply";
        reply.addEventListener("click", () => {
          const quote = "> " + (entry.text || "").split("\n")[0].slice(0, 80) + "\n";
          chatInput.value = quote + chatInput.value;
          chatInput.dispatchEvent(new Event("input", { bubbles: true }));
          chatInput.focus();
        });
        foot.appendChild(seen);
        foot.appendChild(reply);
        div.appendChild(foot);
      }
      chatLog.appendChild(div);
    });
    if (!hidden) chatLog.scrollTop = nearBottom ? chatLog.scrollHeight : keepScroll;
  }

  async function pollChat() {
    try {
      const response = await fetch("/chat", { cache: "no-store" });
      if (!response.ok) return;
      const lines = (await response.text()).split("\n").filter(Boolean);
      if (lines.length !== chatCount) {
        const initialLoad = chatCount === 0;
        const fresh = lines.slice(chatCount).map((l) => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
        chatCount = lines.length;
        renderChat(lines);
        if (!initialLoad) fresh.forEach((entry) => {
          if (entry.from === "agent" && entry.question) notify("Input needed", entry.text, true);
          else if (entry.from === "agent") notify("Agent update", entry.text);
          else if (entry.from === "system") notify("Status board", entry.text);
        });
      }
      if (chatPane.hidden) {
        const unread = Math.max(0, chatCount - chatSeen);
        chatBadge.textContent = unread > 99 ? "99+" : String(unread);
        chatBadge.classList.toggle("on", unread > 0);
      } else {
        markChatSeen();
      }
    } catch {}
  }

  document.getElementById("chat-toggle").addEventListener("click", () => {
    chatPane.hidden = !chatPane.hidden;
    document.getElementById("chat-toggle").setAttribute("aria-pressed", chatPane.hidden ? "false" : "true");
    if (!chatPane.hidden) { markChatSeen(); chatLog.scrollTop = chatLog.scrollHeight; chatInput.focus(); }
  });
  document.getElementById("menu-toggle").addEventListener("click", () => {
    frame.contentDocument?.querySelector("[data-sidebar-toggle]")?.click();
  });
  document.getElementById("chat-close").addEventListener("click", () => {
    chatPane.hidden = true;
    document.getElementById("chat-toggle").setAttribute("aria-pressed", "false");
  });

  // Pasted images stage as a preview above the input and ride along with the
  // next send (Evren 2026-07-17).
  let pendingImg = null;
  const attachWrap = document.getElementById("chat-attach");
  const attachImg = document.getElementById("chat-attach-img");

  function setPendingImg(src) {
    pendingImg = src;
    attachWrap.hidden = !src;
    if (src) attachImg.src = src;
    else attachImg.removeAttribute("src");
  }

  document.getElementById("chat-attach-remove").addEventListener("click", () => setPendingImg(null));

  chatInput.addEventListener("paste", (event) => {
    const file = [...(event.clipboardData?.files || [])].find((f) => f.type?.startsWith("image/"));
    if (!file) return;
    event.preventDefault();
    const reader = new FileReader();
    reader.onload = () => {
      const image = new Image();
      image.onload = () => {
        const scale = Math.min(1, 1000 / (image.naturalWidth || 1000));
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round((image.naturalWidth || 1) * scale));
        canvas.height = Math.max(1, Math.round((image.naturalHeight || 1) * scale));
        canvas.getContext("2d").drawImage(image, 0, 0, canvas.width, canvas.height);
        let out = canvas.toDataURL("image/webp", 0.85);
        if (!out.startsWith("data:image/webp")) out = canvas.toDataURL("image/jpeg", 0.85);
        setPendingImg(out.length < String(reader.result).length ? out : String(reader.result));
      };
      image.src = String(reader.result);
    };
    reader.readAsDataURL(file);
  });

  // Half-typed messages survive anything — reload, tab close, a stray
  // shortcut (Evren's report: a draft vanished with the pane).
  const CHAT_DRAFT_KEY = "punchlist-status-chat-draft";
  chatInput.value = localStorage.getItem(CHAT_DRAFT_KEY) || "";
  chatInput.addEventListener("input", () => {
    if (chatInput.value) localStorage.setItem(CHAT_DRAFT_KEY, chatInput.value);
    else localStorage.removeItem(CHAT_DRAFT_KEY);
  });

  async function sendChat() {
    const text = chatInput.value.trim();
    if (!text && !pendingImg) return;
    const body = { from: "user", text };
    if (pendingImg) body.img = pendingImg;
    chatInput.value = "";
    localStorage.removeItem(CHAT_DRAFT_KEY);
    chatInput.style.height = "36px";
    setPendingImg(null);
    try {
      await fetch("/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      await pollChat();
    } catch {}
  }
  document.getElementById("chat-form").addEventListener("submit", (event) => { event.preventDefault(); sendChat(); });
  chatInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter" && !event.shiftKey) { event.preventDefault(); sendChat(); }
  });

  // Alt+Left is the browser's Back shortcut: a stray press was navigating the
  // whole page away, killing a half-typed chat message. Swallow both directions.
  document.addEventListener("keydown", (event) => {
    if (event.altKey && (event.key === "ArrowLeft" || event.key === "ArrowRight")) event.preventDefault();
  });

  // Settings (gear), desktop notifications, and full-auto mode (intake #5).
  let prefs = {};
  const gear = document.getElementById("chat-gear");
  const settingsPanel = document.getElementById("chat-settings");
  const prefNotifications = document.getElementById("pref-notifications");
  const prefFullAuto = document.getElementById("pref-fullauto");

  gear.addEventListener("click", () => {
    settingsPanel.hidden = !settingsPanel.hidden;
    gear.setAttribute("aria-expanded", settingsPanel.hidden ? "false" : "true");
  });

  // Pause and stop are chat messages under the hood: the agent's file watcher
  // wakes on them like any other message and obeys at its next tool boundary
  // (a terminal agent cannot be interrupted mid-step from a web page).
  async function sendControl(text) {
    try {
      await fetch("/chat", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ from: "user", text }) });
      await pollChat();
    } catch {}
  }
  document.getElementById("chat-pause").addEventListener("click", () => sendControl("⏸ PAUSE — finish the current step, then hold all work until I write resume"));
  document.getElementById("chat-stop").addEventListener("click", () => sendControl("⏹ STOP — wrap up now, log your state, and go offline"));

  async function loadPrefs() {
    try {
      prefs = await (await fetch("/prefs", { cache: "no-store" })).json();
    } catch { prefs = {}; }
    prefNotifications.checked = Boolean(prefs.notifications);
    prefFullAuto.checked = Boolean(prefs.fullAuto);
    updateNotifPerm();
  }
  async function savePrefs(patch) {
    Object.assign(prefs, patch);
    try {
      await fetch("/prefs", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(patch) });
    } catch {}
  }
  prefNotifications.addEventListener("change", async () => {
    if (prefNotifications.checked && "Notification" in window && Notification.permission === "default") {
      const granted = await Notification.requestPermission();
      if (granted !== "granted") { prefNotifications.checked = false; return; }
    }
    savePrefs({ notifications: prefNotifications.checked });
    updateNotifPerm();
  });
  prefFullAuto.addEventListener("change", () => savePrefs({ fullAuto: prefFullAuto.checked }));
  loadPrefs();

  function notify(title, body, always = false) {
    if (!prefs.notifications || !("Notification" in window) || Notification.permission !== "granted") return;
    // Gated notifications stay quiet only while he is actually ON the page.
    // A visible-but-unfocused tab (second monitor, terminal in front) still
    // notifies; run-complete and input-needed fire regardless (Evren 2026-07-18).
    if (!always && !document.hidden && document.hasFocus()) return;
    try { new Notification(title, { body: (body || "").slice(0, 120) }); } catch {}
  }

  const notifGrant = document.getElementById("notif-grant");
  function updateNotifPerm() {
    notifGrant.hidden = !(prefs.notifications && "Notification" in window && Notification.permission !== "granted");
  }
  notifGrant.addEventListener("click", async () => {
    await Notification.requestPermission();
    updateNotifPerm();
  });

  // Pane width, input auto-grow, and the log/input divider (intake #3/#4 asks).
  const CHAT_W_KEY = "punchlist-status-chat-width";
  const INPUT_CAP_KEY = "punchlist-status-input-cap";
  let inputCap = Number(localStorage.getItem(INPUT_CAP_KEY)) || 120;
  const savedChatW = Number(localStorage.getItem(CHAT_W_KEY));
  if (savedChatW >= 260) chatPane.style.width = savedChatW + "px";

  function growInput() {
    chatInput.style.height = "36px";
    chatInput.style.height = Math.min(Math.max(36, chatInput.scrollHeight), inputCap) + "px";
  }
  chatInput.addEventListener("input", growInput);

  (() => {
    const vdiv = document.getElementById("chat-vdivider");
    let drag = null;
    vdiv.addEventListener("pointerdown", (event) => {
      drag = { x: event.clientX, w: chatPane.clientWidth };
      vdiv.setPointerCapture(event.pointerId);
      vdiv.classList.add("dragging");
    });
    vdiv.addEventListener("pointermove", (event) => {
      if (!drag) return;
      const w = Math.min(Math.round(window.innerWidth * 0.6), Math.max(260, drag.w + (drag.x - event.clientX)));
      chatPane.style.width = w + "px";
    });
    vdiv.addEventListener("pointerup", () => {
      drag = null;
      vdiv.classList.remove("dragging");
      localStorage.setItem(CHAT_W_KEY, String(chatPane.clientWidth));
    });
    const hdiv = document.getElementById("chat-hdivider");
    let hdrag = null;
    hdiv.addEventListener("pointerdown", (event) => {
      hdrag = { y: event.clientY, cap: inputCap };
      hdiv.setPointerCapture(event.pointerId);
      hdiv.classList.add("dragging");
    });
    hdiv.addEventListener("pointermove", (event) => {
      if (!hdrag) return;
      inputCap = Math.min(320, Math.max(36, hdrag.cap + (hdrag.y - event.clientY)));
      chatInput.style.height = inputCap + "px";
    });
    hdiv.addEventListener("pointerup", () => {
      hdrag = null;
      hdiv.classList.remove("dragging");
      localStorage.setItem(INPUT_CAP_KEY, String(inputCap));
      growInput();
    });
  })();

  // ---- Sync loop --------------------------------------------------------------

  // ponytail: full-state GET + canon compare every 2s; over localhost this is
  // invisible at current board size. If image-heavy boards make the parse cost
  // real, upgrade to If-Modified-Since on /state — not to sockets.
  async function tick() {
    applyTheme();
    pollChat();
    pollAgents();
    pollCtx();
    graphTick();
    try {
      const local = tagUserTasks();
      const localCanon = local === null ? null : canon(local);
      if (localCanon !== null && localCanon !== lastCanon) {
        await fetch("/state", { method: "POST", headers: { "content-type": "application/json" }, body: localCanon });
        lastCanon = localCanon;
        mark("pushed");
        return;
      }
      const response = await fetch("/state", { cache: "no-store" });
      if (!response.ok) return;
      const server = await response.text();
      if (canon(server) !== lastCanon) {
        // Never yank the board out from under an active caret: defer the
        // reload while Evren is focused in an editable, up to 60 s.
        const focused = frame.contentDocument?.activeElement;
        const editing = focused && (focused.isContentEditable || /^(INPUT|TEXTAREA)$/.test(focused.tagName));
        if (editing && Date.now() - (pullDeferredSince ||= Date.now()) < 60000) {
          mark("update waiting");
          return;
        }
        pullDeferredSince = null;
        localStorage.setItem(KEY, server);
        lastCanon = canon(server);
        frame.contentWindow?.location.reload();
        mark("updated");
      } else {
        pullDeferredSince = null;
        mark("synced");
      }
    } catch {
      stamp.textContent = "server offline";
    }
  }

  (async () => {
    applyTheme();
    try {
      const response = await fetch("/state", { cache: "no-store" });
      if (response.ok) {
        const server = await response.text();
        localStorage.setItem(KEY, server);
        lastCanon = canon(server);
      }
    } catch {}
    frame.src = "/board";
    pollChat();
    setInterval(tick, 2000);
    // background tabs throttle the interval to ~1/min; catch up the moment
    // the page is looked at again so stale dots and unread chat never linger
    document.addEventListener("visibilitychange", () => { if (!document.hidden) tick(); });
    window.addEventListener("focus", () => tick());
  })();
</script>
</body>
</html>
