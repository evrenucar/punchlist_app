            - text: on February 10, 2020 [
            - link "1 favorite" [ref=e125] [cursor=pointer]:
              - /url: https://ask.metafilter.com/favorited/4/4904299
            - text: "]"
        - generic [ref=e127]:
          - generic [ref=e128]: "Response by poster:"
          - text: "Honestly, I've yet to find an app that does this and ticks all my other boxes. But here are the ones I've found, here and elsewhere, that do it at all:"
          - list [ref=e129]:
            - listitem [ref=e130]: Marvin (thanks, brook horse)
            - listitem [ref=e131]: Outlook tasks — like, the minimal task tracker feature that's built into the regular calendar and email program
            - listitem [ref=e132]: The premium version of Ticktick
            - listitem [ref=e133]: Asana (thanks, Miko)
            - listitem [ref=e134]: OmniFocus (thanks, Moira)
            - listitem [ref=e135]: Things
