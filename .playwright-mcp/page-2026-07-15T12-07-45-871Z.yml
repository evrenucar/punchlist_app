  - main [ref=e60]:
    - generic [ref=e62]:
      - generic [ref=e63]:
        - heading [level=1] [ref=e64]:
          - text: Distinguishing different kinds of deadlines in to-do apps
          - generic [ref=e65]:
            - text: February 10, 2020 7:38 AM
            - link [ref=e66] [cursor=pointer]:
              - /url: https://ask.metafilter.com/341806/Distinguishing-different-kinds-of-deadlines-in-to-do-apps/rss
            - link "Subscribe" [ref=e68] [cursor=pointer]:
              - /url: https://ask.metafilter.com/341806/Distinguishing-different-kinds-of-deadlines-in-to-do-apps/rss
        - generic [ref=e69]:
          - text: "To-do list app users: How do you distinguish between \"actual external deadline,\" \"fake deadline I set to motivate myself,\" and \"day when I put the task on my schedule to work on\"? It's often the case for me that all three dates are different, and I've gotten myself in trouble before by forgetting one of the three, but most apps seem to only allow one due date. If this is a situation you find yourself in too, how do you handle it?"
          - generic [ref=e70]: I use Todoist, if it's relevant, but I'd consider switching if another app handled this more gracefully.
          - generic [ref=e71]:
            - text: posted by
            - link "nebulawindphone" [ref=e72] [cursor=pointer]:
              - /url: https://www.metafilter.com/user/21600
            - text: to
            - link "Grab Bag" [ref=e73] [cursor=pointer]:
              - /url: https://ask.metafilter.com/grab-bag
            - text: (8 answers total)
            - link "7 users marked this as a favorite" [ref=e75] [cursor=pointer]:
              - /url: https://ask.metafilter.com/favorited/3/341806
        - insertion [ref=e77]
        - generic [ref=e81]:
          - generic [ref=e82]: "Best answer:"
          - text: This is why I love Amazing Marvin. It has due dates (actual deadline), end dates ("fake" deadline), and scheduled dates (when I'm going to work on it).
          - generic [ref=e83]:
            - text: posted by
            - link "brook horse" [ref=e84] [cursor=pointer]:
              - /url: https://www.metafilter.com/user/255864
            - text: at
            - link "7:47 AM" [ref=e85] [cursor=pointer]:
              - /url: https://ask.metafilter.com/341806/Distinguishing-different-kinds-of-deadlines-in-to-do-apps#4904091
            - text: on February 10, 2020 [
            - link "1 favorite" [ref=e86] [cursor=pointer]:
              - /url: https://ask.metafilter.com/favorited/4/4904091
            - text: "]"
        - generic [ref=e88]:
          - generic [ref=e89]: "Best answer:"
          - emphasis [ref=e90]: "To-do list app users: How do you distinguish between \"actual external deadline,\" \"fake deadline I set to motivate myself,\" and \"day when I put the task on my schedule to work on\"?"
          - text: It sounds like you need project schedules, not just a list. You might want to use a project manager like Asana.
          - generic [ref=e91]:
            - text: posted by
            - link "Miko" [ref=e92] [cursor=pointer]:
              - /url: https://www.metafilter.com/user/19344
            - text: at
            - link "8:00 AM" [ref=e93] [cursor=pointer]:
              - /url: https://ask.metafilter.com/341806/Distinguishing-different-kinds-of-deadlines-in-to-do-apps#4904098
            - text: on February 10, 2020 [
            - link "2 favorites" [ref=e94] [cursor=pointer]:
              - /url: https://ask.metafilter.com/favorited/4/4904098
            - text: "]"
        - generic [ref=e96]:
          - text: The simplest solution might be to start a new habit of including the real deadline in the task title &/or setting it as a
          - link "recurring task" [ref=e97] [cursor=pointer]:
            - /url: https://get.todoist.help/hc/en-us/articles/360000636289-Set-a-recurring-due-date
          - text: . "TPS Report (due 3/1)" scheduled weekly starting 2/14 until 3/1
          - generic [ref=e98]:
            - text: posted by
            - link "kochenta" [ref=e99] [cursor=pointer]:
              - /url: https://www.metafilter.com/user/85255
            - text: at
            - link "8:33 AM" [ref=e100] [cursor=pointer]:
              - /url: https://ask.metafilter.com/341806/Distinguishing-different-kinds-of-deadlines-in-to-do-apps#4904122
            - text: on February 10, 2020 [
            - link "3 favorites" [ref=e101] [cursor=pointer]:
              - /url: https://ask.metafilter.com/favorited/4/4904122
            - text: "]"
        - generic [ref=e103]:
          - text: This may or may not be helpful, but I try to eliminate the middle type from my workflow. Rather than having a motivational effect, I find those aspirational dates tend to get rescheduled *a lot* in the run up to the real deadline. At a minimum, bumping fake dates throughout the week consumes time I could have spent actually getting something done. I also find that rescheduling things so often forms a habit which eventually bleeds over to my real deadlines, causing me to become somewhat numb to them/increasing the odds that I’ll miss them.
          - generic [ref=e104]:
            - text: posted by
            - link "FallibleHuman" [ref=e105] [cursor=pointer]:
              - /url: https://www.metafilter.com/user/280646
            - text: at
            - link "8:56 AM" [ref=e106] [cursor=pointer]:
              - /url: https://ask.metafilter.com/341806/Distinguishing-different-kinds-of-deadlines-in-to-do-apps#4904134
            - text: on February 10, 2020 [
            - link "4 favorites" [ref=e107] [cursor=pointer]:
              - /url: https://ask.metafilter.com/favorited/4/4904134
            - text: "]"
        - generic [ref=e109]:
          - generic [ref=e110]: "Response by poster:"
          - text: That's a fair point. I do at least need something with two kinds of dates you can assign — "real deadline" and "day when I've put it on my to-do list to check off" are the bare minimum for how I work. But I could probably do ok with just those two.
          - generic [ref=e111]:
            - text: posted by
            - link "nebulawindphone" [ref=e112] [cursor=pointer]:
              - /url: https://www.metafilter.com/user/21600
            - text: at
            - link "10:19 AM" [ref=e113] [cursor=pointer]:
              - /url: https://ask.metafilter.com/341806/Distinguishing-different-kinds-of-deadlines-in-to-do-apps#4904185
            - text: on February 10, 2020
        - generic [ref=e115]:
          - text: "I use Todoist. Plan to do it: set the due date for then Personal deadline: make a note in the todo text (do by X) Need to do something further with it: make a note (post on X) with whatever I need to do. Usually I work on it, duplicate the entry (so I can check off working on it) and then redate it to the day I need to make the further step as needed. The 'do by' notes are so that I know what the actual deadline is and don't keep postponing it. Having it all in the subject line makes it really easy to look at the dates and figure out what stuff is high priority. (I'm a librarian, so I have a mix of 'must answer this promptly' and 'long term project with a hard deadline' and 'thing I'd like to get done, but no one including me is really attached to a particular date within the next 3-6 months')"
          - generic [ref=e116]:
            - text: posted by
            - link "jenettsilver" [ref=e117] [cursor=pointer]:
              - /url: https://www.metafilter.com/user/277818
            - text: at
            - link "11:13 AM" [ref=e118] [cursor=pointer]:
              - /url: https://ask.metafilter.com/341806/Distinguishing-different-kinds-of-deadlines-in-to-do-apps#4904225
            - text: on February 10, 2020
        - generic [ref=e120]:
          - generic [ref=e121]: "Best answer:"
          - text: I have an older version of OmniFocus Pro and use "defer" and "due" dates. When a project hits its defer date, I get an alert that it's available. Not sure what the basic version has included, but pro gives me the option to filter by various criteria, including defer and due dates. When it's time to focus on a project, I move it up into my doing-now folder, which ideally holds no more than what I will be working on in any particular week. I use my calendar for appointments, events, etc. only.
          - generic [ref=e122]:
            - text: posted by
            - link "moira" [ref=e123] [cursor=pointer]:
              - /url: https://www.metafilter.com/user/31215
            - text: at
